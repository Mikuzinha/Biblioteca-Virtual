<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="login-page">

    <div class="container">

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="erro-login">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <h1>📚 Bem-vindo</h1>

        <p class="subtitulo">
            Entre na Biblioteca Virtual Escolar
            para acessar livros e conteúdos educativos.
        </p>

        <form method="POST">

            <div class="input-group">

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    placeholder="Digite seu email"
                    required
                >

            </div>

            <div class="input-group">

                <label>Senha</label>

                <input
                    type="password"
                    name="senha"
                    placeholder="Digite sua senha"
                    required
                >

            </div>

            <div class="extras">

                <label class="remember">
                    <input type="checkbox">
                    Lembrar de mim
                </label>

                <a href="#">Esqueceu a senha?</a>

            </div>

            <button type="submit">
                🔓 Entrar
            </button>

        </form>

        <div class="register">

            <p>
                Ainda não possui conta?
            </p>

            <a href="{{ url_for('cadastro') }}">
                Criar conta
            </a>

        </div>

    </div>

</div>

</body>
</html>
